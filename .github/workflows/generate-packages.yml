name: Generate packages.json

on:
  push:
    paths:
      - "sources.json"
      - "pending_sources.json"
      - ".github/workflows/generate-packages.yml"
      - "scripts/generate-packages.mjs"
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate packages.json
        run: node scripts/generate-packages.mjs

      - name: Commit updated package files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add packages.json pending_packages.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update package indexes"
          git push
