name: Validate app sources

on:
  pull_request:
    paths:
      - "sources.json"
      - "scripts/validate-sources.mjs"
      - ".github/workflows/validate-sources.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate app sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate sources
        run: node scripts/validate-sources.mjs
